<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salah Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Design Tokens ────────────────────────────────────────────────────────
       Dominant Neutral   : #FFFFFF   — App screen backgrounds & cards
       Primary Accent      : #1A3D2B   — Deep Forest Green: buttons, branding
       Background Neutral  : #7D9E87   — Sage Green: presentation canvas
       Supporting Accent   : #A8C5B0→#C8DDD0 — Soft Gradient Green: banners
       Highlight Color     : #C9A03C / #F9D423 — Warm Gold: active states
       Typography          : #2D2D2D   — Charcoal: text, icons, labels
    ── */
    :root {
      --bg-gradient: linear-gradient(160deg, #6b9278 0%, #7D9E87 55%, #8dab96 100%);
      --text-main: #2D2D2D;
      --text-muted: rgba(26, 61, 43, 0.55);
      --text-muted-alt: rgba(26, 61, 43, 0.65);

      --header-bg: linear-gradient(135deg, #A8C5B0, #C8DDD0);
      --header-border: rgba(26, 61, 43, 0.18);
      --header-text: #1A3D2B;

      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(26, 61, 43, 0.15);
      --card-bg-hover: rgba(255, 255, 255, 0.9);

      --accent-color: #C9A03C;
      --accent-text: #ffffff;

      --btn-bg: rgba(255, 255, 255, 0.6);
      --btn-hover: rgba(255, 255, 255, 0.9);
      --btn-border: rgba(26, 61, 43, 0.25);
      --btn-primary-bg: linear-gradient(135deg, #1A3D2B, #2d6a4f);
      --btn-primary-hover-shadow: rgba(26, 61, 43, 0.35);

      --widget-bg: rgba(255, 255, 255, 0.25);
      --widget-border: rgba(26, 61, 43, 0.2);
    }

    body.theme-night {
      --bg-gradient: linear-gradient(160deg, #131A22 0%, #1A2430 55%, #243040 100%);
      --text-main: #E6E6E6;
      --text-muted: rgba(255, 255, 255, 0.5);
      --text-muted-alt: rgba(255, 255, 255, 0.5);

      --header-bg: linear-gradient(135deg, #1A2430, #243040);
      --header-border: rgba(255, 255, 255, 0.1);
      --header-text: #FFFFFF;

      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-bg-hover: rgba(255, 255, 255, 0.1);

      --accent-color: #D34545;
      --accent-text: #ffffff;

      --btn-bg: rgba(255, 255, 255, 0.1);
      --btn-hover: rgba(255, 255, 255, 0.15);
      --btn-border: rgba(255, 255, 255, 0.2);
      --btn-primary-bg: linear-gradient(135deg, #1A2430, #243040);
      --btn-primary-hover-shadow: rgba(0, 0, 0, 0.5);

      --widget-bg: rgba(0, 0, 0, 0.25);
      --widget-border: rgba(255, 255, 255, 0.1);
    }

    body.theme-desert {
      --bg-gradient: linear-gradient(160deg, #EADBC8 0%, #F8F0E5 55%, #DAC0A3 100%);
      --text-main: #4A3A2A;
      --text-muted: rgba(74, 58, 42, 0.55);
      --text-muted-alt: rgba(74, 58, 42, 0.65);

      --header-bg: linear-gradient(135deg, #DAC0A3, #EADBC8);
      --header-border: rgba(74, 58, 42, 0.15);
      --header-text: #4A3A2A;

      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(74, 58, 42, 0.15);
      --card-bg-hover: #FFFFFF;

      --accent-color: #B28350;
      --accent-text: #ffffff;

      --btn-bg: rgba(255, 255, 255, 0.5);
      --btn-hover: rgba(255, 255, 255, 0.8);
      --btn-border: rgba(74, 58, 42, 0.25);
      --btn-primary-bg: linear-gradient(135deg, #A8815C, #8C6A48);
      --btn-primary-hover-shadow: rgba(140, 106, 72, 0.35);

      --widget-bg: rgba(255, 255, 255, 0.4);
      --widget-border: rgba(74, 58, 42, 0.2);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      min-height: fit-content;
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-emblem {
      font-size: 28px;
      filter: drop-shadow(0 0 8px rgba(201, 160, 60, 0.55));
    }

    .header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--header-text);
      letter-spacing: 0.04em;
    }

    .header-text p {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-settings {
      margin-left: auto;
      background: none;
      border: 1px solid var(--header-border);
      border-radius: 8px;
      color: var(--header-text);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .header-settings:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ── Status badge ── */
    #status-bar {
      margin: 14px 16px 0;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.3s;
    }

    #status-bar.ok {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
    }

    #status-bar.blocked {
      background: rgba(201, 160, 60, 0.2);
      border: 1px solid rgba(201, 160, 60, 0.5);
      color: var(--accent-color);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(201, 160, 60, 0.35);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(201, 160, 60, 0);
      }
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ok .status-dot {
      background: var(--text-main);
    }

    .blocked .status-dot {
      background: var(--accent-color);
    }

    /* ── Location row ── */
    #location-row {
      margin: 10px 16px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--text-muted-alt);
    }

    /* ── Prayer times grid ── */
    .section-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      padding: 14px 16px 8px;
    }

    #prayers-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 16px;
    }

    .prayer-row {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 10px 14px;
      transition: all 0.2s;
    }

    .prayer-row.next {
      background: var(--card-bg-hover);
      border-color: var(--accent-color);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transform: scale(1.02);
      z-index: 2;
      animation: pulse-next 2s infinite alternate;
    }

    @keyframes pulse-next {
      from {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        border-color: var(--card-border);
      }

      to {
        box-shadow: 0 4px 16px rgba(201, 160, 60, 0.25);
        border-color: var(--accent-color);
      }
    }

    .prayer-row.passed {
      opacity: 0.5;
    }

    .prayer-name {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .prayer-name-ar {
      font-family: 'Amiri', serif;
      font-size: 0.9rem;
      color: var(--accent-color);
      margin-left: 6px;
    }

    .prayer-time {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-main);
      font-variant-numeric: tabular-nums;
    }

    .prayer-badge {
      font-size: 0.58rem;
      background: var(--accent-color);
      color: var(--accent-text);
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ── Next prayer countdown ── */
    #next-section {
      margin: 14px 16px 0;
      background: var(--card-bg);
      border: 1px solid var(--accent-color);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #next-section .label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #next-section .value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 2px;
    }

    #countdown {
      margin-left: auto;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-color);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    /* ── Footer ── */
    .footer {
      padding: 14px 16px 18px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text-main);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn:hover {
      background: var(--btn-hover);
      color: var(--text-main);
    }

    .btn.primary {
      background: var(--btn-primary-bg);
      color: #ffffff;
      font-weight: 700;
      border: none;
    }

    .btn.primary:hover {
      box-shadow: 0 4px 16px var(--btn-primary-hover-shadow);
      transform: translateY(-1px);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--card-border), transparent);
      margin: 2px 16px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--card-border);
      border-top-color: var(--text-main);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Widgets ── */
    #widget-view {
      padding: 16px;
      min-height: 100vh;
    }

    #widget-card {
      background: var(--widget-bg);
      border: 1px solid var(--widget-border);
      border-radius: 20px;
      padding: 24px 20px;
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    #widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 0.95rem;
      direction: rtl;
    }

    #widget-location {
      font-weight: 600;
    }

    #widget-date {
      opacity: 0.8;
      font-size: 0.8rem;
    }

    #widget-countdown-container {
      margin-bottom: 28px;
    }

    #widget-prayers-grid {
      display: grid;
      grid-template-rows: repeat(3, auto);
      grid-auto-flow: column;
      gap: 16px 20px;
      direction: rtl;
      position: relative;
    }

    .widget-actions {
      margin-top: 24px;
      text-align: center;
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .widget-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      padding: 8px 16px;
      border-radius: 12px;
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .widget-btn:hover {
      background: var(--btn-hover);
    }
  </style>
</head>

<body>
  <div id="main-view">
    <div class="header">
      <div class="header-emblem">&#9789;</div>
      <div class="header-text">
        <h1>Salah Time</h1>
        <p>Prayer Reminder &amp; Blocker</p>
      </div>
      <button class="header-settings" id="btn-settings" title="Settings">&#9881;</button>
    </div>

    <div id="status-bar" class="ok">
      <div class="status-dot"></div>
      <span id="status-text">Checking prayer times…</span>
    </div>

    <div id="location-row">
      📍 <span id="location-text">Detecting location…</span>
    </div>

    <p class="section-title">Today's Prayer Times</p>

    <div id="prayers-grid">
      <div style="text-align:center; padding: 20px; color: rgba(255,255,255,0.3); font-size:0.8rem;">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="next-section" style="display:none">
      <div>
        <div class="label">Next Prayer</div>
        <div class="value" id="next-prayer-name">—</div>
      </div>
      <div id="countdown">—</div>
    </div>

    <div class="divider" style="margin-top:14px;"></div>

    <div class="footer">
      <button class="btn" id="btn-refresh">Refresh</button>
      <button class="btn primary" id="btn-settings-full">Settings</button>
    </div>
  </div>

  <div id="widget-view" style="display:none;">
    <div id="widget-card">
      <div id="widget-header">
        <span id="widget-location"></span>
        <span id="widget-date"></span>
      </div>
      <div id="widget-countdown-container"></div>
      <div id="widget-prayers-grid">
        <!-- injected -->
      </div>
      <div class="widget-actions">
        <button id="widget-btn-refresh" class="widget-btn">↻ Refresh</button>
        <button id="widget-btn-settings" class="widget-btn">⚙ Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
